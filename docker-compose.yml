services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: car-price-api
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload during development: mount source code
      - ./src:/app/src
      # Mount model artifact (useful if you retrain without rebuilding the image)
      - ./model.joblib:/app/model.joblib:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped