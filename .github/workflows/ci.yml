name: MLOps CI Pipeline

on:
  push:
    branches: [ main, feature-mlops-ci ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Setup Data for CI
        run: |
          mkdir -p data/raw data/processed
          cp data/raw/car_price_prediction_with_missing.csv data/raw/ || echo "File already in place"
          cp data/processed/car_price_cleaned.csv data/processed/ || echo "File already in place"

      - name: Run Linting
        run: make lint

      - name: Preprocess & Train (Needed for API tests)
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          uv run python -m src.data.preprocess
          uv run python src/models/train.py --n-trees 5 --max-depth 2

      - name: Run All Tests (Unit + API)
        # vérification que la couverture est >= 60%
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=60

  docker-check:
    runs-on: ubuntu-latest
    needs: quality-and-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t car-price-app:test .