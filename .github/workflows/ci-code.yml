name: CI — Code Quality & Tests

on:
  push:
    branches: [ main, feature/docker-cd ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Linting
        run: make lint || echo "Linting issues found, but continuing..."

      - name: Run Unit & API Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=60
